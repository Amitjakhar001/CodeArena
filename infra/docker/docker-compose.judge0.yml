# Phase 2 single-node Judge0 stack — runs on GCP VM 2.
# In Phase 8 we'll split this into stateful (VM 2) + stateless (VM 3).
#
# Required env vars (loaded from .env on VM 2):
#   JUDGE0_DB_PASSWORD
#   JUDGE0_REDIS_PASSWORD
#
# Port 2358 is reachable only via IAP tunnel — the firewall rule
# `codearena-allow-iap` restricts source CIDR to Google IAP.

services:
  judge0-db:
    image: postgres:13.0
    container_name: judge0-db
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  judge0-redis:
    image: redis:6.0
    container_name: judge0-redis
    command: ["redis-server", "--requirepass", "${JUDGE0_REDIS_PASSWORD}"]
    volumes:
      - judge0-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${JUDGE0_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
      JUDGE0_TELEMETRY_ENABLE: "false"
      RESTART_MAX_TRIES: "10"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    ports:
      - "2358:2358"
    privileged: true
    restart: unless-stopped

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: judge0-workers
    command: ["./scripts/workers"]
    environment:
      REDIS_HOST: judge0-redis
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
      POSTGRES_HOST: judge0-db
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      POSTGRES_DB: judge0
    depends_on:
      - judge0-server
    privileged: true
    restart: unless-stopped

volumes:
  judge0-db-data:
  judge0-redis-data:
